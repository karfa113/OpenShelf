<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Brand Background -->
  <rect width="512" height="512" rx="128" fill="#0D0D0D" />
  
  <!-- Subtle Outer Glass Border matching app_colors.border -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#2A2A2A" stroke-width="4" />
  
  <!-- Geometric Logo Mark -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Left Leaf / Shadowed Page (textTertiary) -->
    <path d="M 256 160 L 140 210 V 350 L 256 300 Z" stroke="#888888" stroke-width="32" />
    
    <!-- Right Leaf / Main Page (Warm Cream Accent) -->
    <path d="M 256 160 L 372 210 V 350 L 256 300 Z" stroke="#EBE9DC" stroke-width="32" />
    
    <!-- Hanging Bookmark / Structural Spine -->
    <path d="M 256 300 V 420" stroke="#EBE9DC" stroke-width="32" />
    
    <!-- Accent Line (mimicking text/code on a manual page) -->
    <line x1="314" y1="235" x2="314" y2="285" stroke="#EBE9DC" stroke-width="24" />
  </g>
</svg>